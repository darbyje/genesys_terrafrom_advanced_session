name: 'Terraform Prod Environment'

on:
  push:
    branches: [ prod ]
  pull_request:
    branches: [ prod ]
    types: [ closed ]

env:
  TF_VERSION: '1.6.0'
  TF_WORKING_DIR: '.'
  AWS_REGION: 'ap-southeast-2'

jobs:
  terraform-plan:
    name: 'Terraform Plan'
    runs-on: ubuntu-latest
    # Only run on direct pushes to prod, not on PR merges
    if: github.event_name == 'push' && github.ref == 'refs/heads/prod' && !contains(github.event.head_commit.message, 'Terraform Plan for Production')
    
    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: ${{ env.TF_VERSION }}

    - name: Setup AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Terraform Format Check
      run: terraform fmt -check -recursive
      continue-on-error: true

    - name: Debug Environment Variables
      run: |
        echo "Checking environment variables..."
        echo "TF_VAR_oauthclient_id is set: ${{ secrets.PROD_OAUTHCLIENT_ID != '' }}"
        echo "TF_VAR_oauthclient_secret is set: ${{ secrets.PROD_OAUTHCLIENT_SECRET != '' }}"
        echo "OAuth Client ID length: ${#TF_VAR_oauthclient_id}"
        echo "OAuth Client Secret length: ${#TF_VAR_oauthclient_secret}"
      env:
        TF_VAR_oauthclient_id: ${{ secrets.PROD_OAUTHCLIENT_ID }}
        TF_VAR_oauthclient_secret: ${{ secrets.PROD_OAUTHCLIENT_SECRET }}
        TF_VAR_aws_region: "ap-southeast-2"

    - name: Terraform Init
      run: terraform init -backend-config=backend-prod.conf -reconfigure
      env:
        TF_VAR_oauthclient_id: ${{ secrets.PROD_OAUTHCLIENT_ID }}
        TF_VAR_oauthclient_secret: ${{ secrets.PROD_OAUTHCLIENT_SECRET }}
        TF_VAR_aws_region: "ap-southeast-2"

    - name: Terraform Validate
      run: terraform validate

    - name: Terraform Plan
      id: plan
      run: terraform plan -no-color -out=tfplan
      env:
        TF_VAR_oauthclient_id: ${{ secrets.PROD_OAUTHCLIENT_ID }}
        TF_VAR_oauthclient_secret: ${{ secrets.PROD_OAUTHCLIENT_SECRET }}
        TF_VAR_aws_region: "ap-southeast-2"

    - name: Check for Changes
      id: changes
      run: |
        if terraform show tfplan | grep -q "No changes"; then
          echo "has_changes=false" >> $GITHUB_OUTPUT
          echo "No changes detected - skipping PR creation"
        else
          echo "has_changes=true" >> $GITHUB_OUTPUT
          echo "Changes detected - will create PR"
        fi

    - name: Clean up existing deployment branch
      if: steps.changes.outputs.has_changes == 'true'
      run: |
        # Delete local branch if it exists
        git branch -D prod-deployment 2>/dev/null || true
        # Delete remote branch if it exists
        git push origin --delete prod-deployment 2>/dev/null || true

    - name: Create Pull Request
      if: steps.changes.outputs.has_changes == 'true'
      uses: peter-evans/create-pull-request@v5
      with:
        token: ${{ secrets.PAT_TOKEN }}
        commit-message: 'Terraform Plan for Production'
        title: '🚀 Production Deployment - Terraform Changes'
        body: |
          ## Production Terraform Deployment
          
          This PR contains Terraform changes for the production environment.
          
          ### Changes Summary
          ```hcl
          ${{ steps.plan.outputs.stdout }}
          ```
          
          ### Required Approvals
          - [ ] Infrastructure Team Approval
          - [ ] Security Review
          - [ ] Change Management Approval
          
          ### Deployment Instructions
          1. Review the Terraform plan above
          2. Ensure all changes are expected and approved
          3. Merge this PR to deploy to production
          
          **⚠️ Warning: This will deploy changes to the production environment**
        branch: prod-deployment
        base: prod
        delete-branch: true
        labels: |
          production
          terraform
          deployment
        assignees: ${{ github.actor }}

    - name: Comment on Commit (No Changes)
      if: steps.changes.outputs.has_changes == 'false'
      uses: actions/github-script@v7
      with:
        script: |
          const output = `#### No Changes Detected 📋
          
          Terraform plan shows no changes are needed for production.
          
          **No PR created** - infrastructure is already up to date.
          
          *Commit: ${context.sha}*
          *Pusher: @${context.actor}*
          `;
          
          github.rest.repos.createCommitComment({
            owner: context.repo.owner,
            repo: context.repo.repo,
            commit_sha: context.sha,
            body: output
          })

  terraform-apply:
    name: 'Terraform Apply'
    runs-on: ubuntu-latest
    # Only run when a PR is merged (closed) to prod
    if: github.event_name == 'pull_request' && github.event.pull_request.merged == true && github.base_ref == 'prod'
    
    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: ${{ env.TF_VERSION }}

    - name: Setup AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Terraform Format Check
      run: terraform fmt -check -recursive
      continue-on-error: true

    - name: Terraform Init
      run: terraform init -backend-config=backend-prod.conf -reconfigure
      env:
        TF_VAR_oauthclient_id: ${{ secrets.PROD_OAUTHCLIENT_ID }}
        TF_VAR_oauthclient_secret: ${{ secrets.PROD_OAUTHCLIENT_SECRET }}
        TF_VAR_aws_region: "ap-southeast-2"

    - name: Terraform Validate
      run: terraform validate

    - name: Terraform Plan
      run: terraform plan -no-color -out=tfplan
      env:
        TF_VAR_oauthclient_id: ${{ secrets.PROD_OAUTHCLIENT_ID }}
        TF_VAR_oauthclient_secret: ${{ secrets.PROD_OAUTHCLIENT_SECRET }}
        TF_VAR_aws_region: "ap-southeast-2"

    - name: Terraform Apply
      run: terraform apply tfplan
      env:
        TF_VAR_oauthclient_id: ${{ secrets.PROD_OAUTHCLIENT_ID }}
        TF_VAR_oauthclient_secret: ${{ secrets.PROD_OAUTHCLIENT_SECRET }}
        TF_VAR_aws_region: "ap-southeast-2" 