name: 'Terraform Prod Environment (Simple)'

on:
  push:
    branches: [ prod ]
  pull_request:
    types: [closed]
    branches: [ prod ]

permissions:
  contents: read
  pull-requests: write
  id-token: write

env:
  TF_VERSION: '1.6.0'
  TF_WORKING_DIR: '.'
  AWS_REGION: 'ap-southeast-2'

jobs:
  terraform:
    name: 'Terraform Deploy'
    runs-on: ubuntu-latest
    
    # Only run this workflow when PR is merged (not when closed without merging)
    if: github.event.pull_request.merged == true || github.event_name == 'push'
    
    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: ${{ env.TF_VERSION }}

    - name: Setup AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Terraform Format Check
      run: terraform fmt -check -recursive
      continue-on-error: true

    - name: Debug Environment Variables
      run: |
        echo "Checking environment variables..."
        echo "TF_VAR_oauthclient_id is set: ${{ secrets.PROD_OAUTHCLIENT_ID != '' }}"
        echo "TF_VAR_oauthclient_secret is set: ${{ secrets.PROD_OAUTHCLIENT_SECRET != '' }}"
        echo "OAuth Client ID length: ${#TF_VAR_oauthclient_id}"
        echo "OAuth Client Secret length: ${#TF_VAR_oauthclient_secret}"
      env:
        TF_VAR_oauthclient_id: ${{ secrets.PROD_OAUTHCLIENT_ID }}
        TF_VAR_oauthclient_secret: ${{ secrets.PROD_OAUTHCLIENT_SECRET }}
        TF_VAR_aws_region: "ap-southeast-2"

    - name: Terraform Init
      run: terraform init -backend-config=backend-prod.conf -reconfigure
      env:
        TF_VAR_oauthclient_id: ${{ secrets.PROD_OAUTHCLIENT_ID }}
        TF_VAR_oauthclient_secret: ${{ secrets.PROD_OAUTHCLIENT_SECRET }}
        TF_VAR_aws_region: "ap-southeast-2"

    - name: Terraform Validate
      run: terraform validate

    - name: Terraform Plan
      id: plan
      run: terraform plan -no-color -out=tfplan
      env:
        TF_VAR_oauthclient_id: ${{ secrets.PROD_OAUTHCLIENT_ID }}
        TF_VAR_oauthclient_secret: ${{ secrets.PROD_OAUTHCLIENT_SECRET }}
        TF_VAR_aws_region: "ap-southeast-2"

    # Post plan comments only on PRs
    - name: Post Plan to GitHub PR
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v7
      with:
        script: |
          const output = `#### Terraform Plan 📝 Production Environment
          <details><summary>Show Plan</summary>
          
          \`\`\`\n
          ${process.env.PLAN}
          \`\`\`
          
          </details>
          
          *Environment: \`production\`*
          *Region: \`ap-southeast-2\`*
          *Pushed by: @${{ github.actor }}, Action: \`${{ github.event_name }}\`*`;
          
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: output
          })
      env:
        PLAN: "${{ steps.plan.outputs.stdout }}"

    # Add approval requirement for production
    - name: Manual Approval for Production
      if: github.event_name == 'push'
      uses: trstringer/manual-approval@v1
      with:
        secret: ${{ github.token }}
        approvers: darbyje  # Replace with actual approvers
        minimum-approvals: 1
        issue-title: "Approve Production Deployment"
        issue-body: "Please review and approve the production deployment"
        exclude-workflow-initiator-as-approver: false

    - name: Terraform Apply
      if: github.event.pull_request.merged == true || github.event_name == 'push'
      run: terraform apply tfplan
      env:
        TF_VAR_oauthclient_id: ${{ secrets.PROD_OAUTHCLIENT_ID }}
        TF_VAR_oauthclient_secret: ${{ secrets.PROD_OAUTHCLIENT_SECRET }}
        TF_VAR_aws_region: "ap-southeast-2"

    # Notify on completion
    - name: Notify Deployment Status
      if: always()
      uses: actions/github-script@v7
      with:
        script: |
          const status = '${{ job.status }}';
          const environment = 'production';
          const message = `#### Terraform Deployment Status: ${status}
          * Environment: \`${environment}\`
          * Region: \`ap-southeast-2\`
          * Workflow: [View Run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})
          * Deployed by: @${{ github.actor }}`;
          
          if ('${{ github.event_name }}' === 'pull_request') {
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: message
            });
          } 